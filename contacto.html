<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAHARI – Contacto</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="announcement-bar">
    🔥 &nbsp;<strong>Envíos Gratis a Todo Chile</strong>&nbsp; 🚀
  </div>

  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="contacto.html" class="active">Contacto</a></li>
    </ul>
    <div class="nav-logo">
      <a href="index.html">
        <img src="img/logo.png" alt="SAHARI Logo" />
      </a>
    </div>
    <div class="nav-icons">
      <a href="#" aria-label="Buscar"><i class="fa-solid fa-magnifying-glass"></i></a>
      <a href="#" aria-label="Cuenta"><i class="fa-regular fa-user"></i></a>
      <a href="#" aria-label="Carrito"><i class="fa-solid fa-bag-shopping"></i></a>
    </div>
  </nav>

  <div class="contact-container">
    <h1>Contacto</h1>
    <div class="contact-form" id="contactForm">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" class="form-control" placeholder="" />
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico *</label>
          <input type="email" id="email" class="form-control" placeholder="" required />
        </div>
      </div>
      <div class="form-group">
        <label for="telefono">Número de teléfono *</label>
        <input type="tel" id="telefono" class="form-control" placeholder="Ej: 912345678" />
      </div>
      <div class="form-group">
        <label for="producto">Producto</label>
        <textarea id="producto" class="form-control" placeholder=""></textarea>
      </div>
      <button type="button" class="btn-submit" onclick="enviarFormulario()" id="btnEnviar">
        Pagar Al Recibir
      </button>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✅</div>
    <div class="toast-text">
      <strong>¡Pedido enviado!</strong>
      <span>Te llegará un WhatsApp para confirmar.</span>
    </div>
  </div>

  <script>
  // ⚠️ REEMPLAZA con tu URL de Railway cuando la tengas
  const RAILWAY_URL = "https://web-production-600da.up.railway.app/pedido";

  async function enviarFormulario() {
    const nombre   = document.getElementById('nombre').value.trim();
    const email    = document.getElementById('email').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const producto = document.getElementById('producto').value.trim();
    const btn      = document.getElementById('btnEnviar');

    if (!email) {
      mostrarToast('error', '⚠️ El correo electrónico es obligatorio.');
      return;
    }
    if (!telefono) {
      mostrarToast('error', '⚠️ El número de teléfono es obligatorio.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      const response = await fetch(RAILWAY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre,
          email,
          telefono,
          producto,
          token: "SECRETO_123"
        })
      });

      if (!response.ok) throw new Error('Error en servidor');

      mostrarToast('success');
      document.getElementById('nombre').value   = '';
      document.getElementById('email').value    = '';
      document.getElementById('telefono').value = '';
      document.getElementById('producto').value = '';

    } catch (err) {
      console.error(err);
      mostrarToast('error', '❌ Error al enviar. Intenta nuevamente.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Pagar Al Recibir';
    }
  }

  function mostrarToast(tipo, mensajePersonalizado) {
    const toast = document.getElementById('toast');
    if (tipo === 'error') {
      toast.innerHTML = `
        <div class="toast-icon">⚠️</div>
        <div class="toast-text">
          <strong>${mensajePersonalizado || 'Error al enviar'}</strong>
          <span>Por favor revisa los datos ingresados.</span>
        </div>`;
      toast.style.background = '#c0392b';
    } else {
      toast.innerHTML = `
        <div class="toast-icon">✅</div>
        <div class="toast-text">
          <strong>¡Pedido enviado! 🎉</strong>
          <span>Te llegará un WhatsApp para confirmar tu pedido.</span>
        </div>`;
      toast.style.background = '#1a1a1a';
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }
  </script>

</body>
</html>
