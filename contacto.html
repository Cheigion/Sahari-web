<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAHARI – Contacto</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- ANNOUNCEMENT BAR -->
  <div class="announcement-bar">
    🔥 &nbsp;<strong>Envíos Gratis a Todo Chile</strong>&nbsp; 🚀
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="productos.html">Productos</a></li>
      <li><a href="contacto.html" class="active">Contacto</a></li>
    </ul>

    <div class="nav-logo">
      <a href="index.html">
        <img src="img/logo.png" alt="SAHARI Logo" />
      </a>
    </div>

    <div class="nav-icons">
      <a href="#" aria-label="Buscar"><i class="fa-solid fa-magnifying-glass"></i></a>
      <a href="#" aria-label="Cuenta"><i class="fa-regular fa-user"></i></a>
      <a href="#" aria-label="Carrito"><i class="fa-solid fa-bag-shopping"></i></a>
    </div>
  </nav>

  <!-- CONTACT FORM -->
  <!-- Sin fetch ni JavaScript — el form envía directo al webhook de n8n -->
  <!-- Los campos llegan a n8n como: $json.nombre / $json.email / $json.telefono / $json.comentario -->
  <div class="contact-container">
    <h1>Contacto</h1>

    <form
      class="contact-form"
      id="contactForm"
      action="https://cheigion.app.n8n.cloud/webhook/d8a69e26-d628-4152-a91a-46341d0839e7"
      method="POST"
      enctype="application/x-www-form-urlencoded"
    >

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" class="form-control" />
        </div>
        <div class="form-group">
          <label for="email">Correo electrónico *</label>
          <input type="email" id="email" name="email" class="form-control" required />
        </div>
      </div>

      <div class="form-group">
        <label for="telefono">Número de teléfono</label>
        <input type="tel" id="telefono" name="telefono" class="form-control" />
      </div>

      <div class="form-group">
        <label for="comentario">Comentario</label>
        <textarea id="comentario" name="comentario" class="form-control"></textarea>
      </div>

      <button class="btn-submit" type="submit">Enviar</button>

    </form>
  </div>

</body>
</html>
