<!-- CONTACT FORM -->
<div class="contact-container">
  <h1>Contacto</h1>

  <form 
    class="contact-form"
    action="https://cheigion.app.n8n.cloud/webhook/d8a69e26-d628-4152-a91a-46341d0839e7"
    method="GET"
    target="hiddenFrame"
    onsubmit="handleSubmit(event)"
  >

    <div class="form-row">
      <div class="form-group">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" class="form-control" />
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" class="form-control" required />
      </div>
    </div>

    <div class="form-group">
      <label for="telefono">Número de teléfono</label>
      <input type="tel" id="telefono" class="form-control" />
    </div>

    <div class="form-group">
      <label for="comentario">Comentario</label>
      <textarea id="comentario" class="form-control"></textarea>
    </div>

    <button type="submit" class="btn-submit" id="btnEnviar">
      Enviar
    </button>

  </form>
</div>

<!-- IFRAME OCULTO -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon">✅</div>
  <div class="toast-text">
    <strong>¡Mensaje enviado correctamente!</strong>
    <span>Nos pondremos en contacto contigo pronto.</span>
  </div>
</div>

<script>
  function handleSubmit(e) {
    const btn = document.getElementById('btnEnviar');
    const email = document.getElementById('email').value.trim();

    // Validación básica
    if (!email) {
      e.preventDefault();
      mostrarToast('error', '⚠️ El correo electrónico es obligatorio.');
      return;
    }

    // Estado loading
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    // Como usamos GET + iframe, no podemos leer respuesta real
    // Simulamos éxito (UX limpia tipo ecommerce)
    setTimeout(() => {
      mostrarToast('success');

      // limpiar campos
      document.getElementById('nombre').value = '';
      document.getElementById('email').value = '';
      document.getElementById('telefono').value = '';
      document.getElementById('comentario').value = '';

      btn.disabled = false;
      btn.textContent = 'Enviar';
    }, 800);
  }

  function mostrarToast(tipo, mensajePersonalizado) {
    const toast = document.getElementById('toast');

    if (tipo === 'error') {
      toast.innerHTML = `
        <div class="toast-icon">⚠️</div>
        <div class="toast-text">
          <strong>${mensajePersonalizado || 'Error al enviar'}</strong>
          <span>Por favor revisa los datos ingresados.</span>
        </div>`;
      toast.style.background = '#c0392b';
    } else {
      toast.innerHTML = `
        <div class="toast-icon">✅</div>
        <div class="toast-text">
          <strong>¡Mensaje enviado correctamente!</strong>
          <span>Nos pondremos en contacto contigo pronto.</span>
        </div>`;
      toast.style.background = '#1a1a1a';
    }

    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }
</script>
