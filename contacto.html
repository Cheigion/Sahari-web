<!-- CONTACT FORM -->
<div class="contact-container">
  <h1>Contacto</h1>

  <form 
    class="contact-form"
    action="https://cheigion.app.n8n.cloud/webhook/d8a69e26-d628-4152-a91a-46341d0839e7"
    method="GET"
    target="hiddenFrame"
    onsubmit="handleSubmit()"
  >

    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" class="form-control" />
      </div>
      <div class="form-group">
        <label>Correo electrónico *</label>
        <input type="email" class="form-control" required />
      </div>
    </div>

    <div class="form-group">
      <label>Número de teléfono</label>
      <input type="tel" class="form-control" />
    </div>

    <div class="form-group">
      <label>Comentario</label>
      <textarea class="form-control"></textarea>
    </div>

    <button type="submit" class="btn-submit" id="btnEnviar">
      Enviar
    </button>

  </form>
</div>

<!-- IFRAME OCULTO -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon">✅</div>
  <div class="toast-text">
    <strong>¡Mensaje enviado correctamente!</strong>
    <span>Nos pondremos en contacto contigo pronto.</span>
  </div>
</div>

<script>
  function handleSubmit() {
    const btn = document.getElementById('btnEnviar');

    // Estado cargando
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    // Simulamos respuesta (porque GET + iframe no devuelve estado fácil)
    setTimeout(() => {
      mostrarToast('success');
      btn.disabled = false;
      btn.textContent = 'Enviar';
    }, 800);
  }

  function mostrarToast(tipo) {
    const toast = document.getElementById('toast');

    if (tipo === 'error') {
      toast.innerHTML = `
        <div class="toast-icon">⚠️</div>
        <div class="toast-text">
          <strong>Error al enviar</strong>
          <span>Intenta nuevamente.</span>
        </div>`;
      toast.style.background = '#c0392b';
    } else {
      toast.innerHTML = `
        <div class="toast-icon">✅</div>
        <div class="toast-text">
          <strong>¡Mensaje enviado correctamente!</strong>
          <span>Nos pondremos en contacto contigo pronto.</span>
        </div>`;
      toast.style.background = '#1a1a1a';
    }

    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }
</script>
